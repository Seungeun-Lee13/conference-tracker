<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oncology Conference Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f6fa;
      --surface:   #ffffff;
      --border:    #e2e5eb;
      --border2:   #cdd1da;
      --text:      #1a1d23;
      --muted:     #6b7280;
      --accent:    #2563eb;
      --accent-bg: #eff6ff;
      --header-bg: #f0f4ff;

      --red:        #dc2626;
      --red-bg:     #fef2f2;
      --red-border: #fca5a5;

      --yellow:        #d97706;
      --yellow-bg:     #fffbeb;
      --yellow-border: #fcd34d;

      --green:        #16a34a;
      --green-bg:     #f0fdf4;
      --green-border: #86efac;

      --grey:        #6b7280;
      --grey-bg:     #f9fafb;
      --grey-border: #d1d5db;

      --passed:     #9ca3af;
      --passed-bg:  #f3f4f6;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13.5px;
      line-height: 1.5;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
    }
    header .sub {
      color: var(--muted);
      font-size: 0.82rem;
      margin-left: 4px;
    }

    /* ── Toolbar ─────────────────────────────────────────── */
    .toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 28px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .toolbar label { color: var(--muted); font-size: 0.78rem; margin-right: 2px; }
    .btn-filter {
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all .12s;
    }
    .btn-filter:hover  { border-color: var(--accent); color: var(--accent); }
    .btn-filter.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .spacer { flex: 1; }
    .search-box {
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.82rem;
      width: 180px;
      outline: none;
    }
    .search-box:focus { border-color: var(--accent); }

    /* ── Table wrapper ───────────────────────────────────── */
    .table-wrap {
      padding: 20px 28px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    /* ── Head ────────────────────────────────────────────── */
    thead tr { background: var(--header-bg); }
    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      position: relative;
    }
    th:hover { color: var(--accent); }
    th.sorted { color: var(--accent); }
    th .sort-icon { margin-left: 4px; opacity: .5; }
    th.sorted .sort-icon { opacity: 1; }

    /* ── Body rows ───────────────────────────────────────── */
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--accent-bg); }

    td {
      padding: 10px 14px;
      vertical-align: middle;
      font-size: 0.84rem;
    }

    /* Conference name cell */
    .conf-name { font-weight: 700; font-size: 0.92rem; }
    .conf-year { color: var(--muted); font-weight: 400; margin-left: 3px; }

    /* Deadline cell */
    .deadline-cell { white-space: nowrap; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 600;
      margin-left: 6px;
      white-space: nowrap;
    }
    .badge.red    { background: var(--red-bg);    color: var(--red);    border: 1px solid var(--red-border); }
    .badge.yellow { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
    .badge.green  { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green-border); }
    .badge.grey   { background: var(--grey-bg);   color: var(--grey);   border: 1px solid var(--grey-border); }
    .badge.passed { background: var(--passed-bg); color: var(--passed); border: 1px solid var(--grey-border); font-style: italic; }

    .deadline-date { color: var(--text); }
    .deadline-date.red    { color: var(--red);    font-weight: 600; }
    .deadline-date.yellow { color: var(--yellow); font-weight: 600; }
    .deadline-date.green  { color: var(--green); }
    .deadline-date.passed { color: var(--passed); }
    .deadline-date.tbd    { color: var(--muted); font-style: italic; }

    /* Dates cell */
    .date-range { white-space: nowrap; }

    /* Location cell */
    .location-country { font-weight: 600; }
    .location-city    { color: var(--muted); font-size: 0.8rem; }
    .location-venue   { color: var(--muted); font-size: 0.76rem; font-style: italic; }

    /* Links cell */
    .link-btn {
      display: inline-block;
      padding: 3px 8px;
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.76rem;
      margin-right: 4px;
      white-space: nowrap;
      transition: background .1s;
    }
    .link-btn:hover { background: var(--accent-bg); }

    /* LB deadline in secondary style */
    .lb-date { color: var(--muted); font-size: 0.78rem; margin-top: 2px; }

    /* ── Empty state ─────────────────────────────────────── */
    .empty-row td {
      text-align: center;
      color: var(--muted);
      padding: 48px;
      font-size: 0.9rem;
    }

    /* ── Footer ──────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 0.76rem;
    }

    /* ── Legend ──────────────────────────────────────────── */
    .legend {
      display: flex;
      gap: 14px;
      align-items: center;
      font-size: 0.74rem;
      color: var(--muted);
      margin-left: 12px;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; }
  </style>
</head>
<body>

<header>
  <span style="font-size:1.4rem">🔬</span>
  <div>
    <h1>Oncology Conference Tracker
      <span class="sub">ASCO · ESMO · AACR · WCLC · USCAP · CAP · SITC</span>
    </h1>
  </div>
</header>

<div class="toolbar">
  <label>Filter:</label>
  <button class="btn-filter active" data-filter="all">All</button>
  <button class="btn-filter" data-filter="upcoming">Upcoming deadlines</button>
  <button class="btn-filter" data-filter="3mo">Deadline &lt; 3 mo</button>
  <button class="btn-filter" data-filter="year">This year</button>

  <div class="legend">
    <span class="legend-item"><span class="badge red" style="margin:0">●</span> ≤30d</span>
    <span class="legend-item"><span class="badge yellow" style="margin:0">●</span> 31–90d</span>
    <span class="legend-item"><span class="badge green" style="margin:0">●</span> 91–180d</span>
    <span class="legend-item"><span class="badge grey" style="margin:0">●</span> 180+d</span>
  </div>

  <div class="spacer"></div>
  <input class="search-box" id="search" type="text" placeholder="🔍  Search conference…" />
</div>

<div class="table-wrap">
  <table id="conf-table">
    <thead>
      <tr>
        <th data-col="name">Conference <span class="sort-icon">↕</span></th>
        <th data-col="abstract_deadline">Abstract Deadline <span class="sort-icon">↕</span></th>
        <th data-col="late_breaking_deadline">Late-Breaking <span class="sort-icon">↕</span></th>
        <th data-col="date_start">Conference Dates <span class="sort-icon">↕</span></th>
        <th data-col="country">Location <span class="sort-icon">↕</span></th>
        <th>Links</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<footer id="footer">Loading…</footer>

<script>
/* ── Helpers ──────────────────────────────────────────────────────────── */
const today = new Date(); today.setHours(0,0,0,0);

function daysUntil(ds) {
  if (!ds) return null;
  const d = new Date(ds + "T00:00:00");
  d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function fmtDate(ds) {
  if (!ds) return null;
  const d = new Date(ds + "T00:00:00");
  return d.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
}

function fmtDateShort(ds) {
  if (!ds) return null;
  const d = new Date(ds + "T00:00:00");
  return d.toLocaleDateString("en-US", { month:"short", day:"numeric" });
}

function badgeCls(days) {
  if (days === null) return "grey";
  if (days < 0)    return "passed";
  if (days <= 30)  return "red";
  if (days <= 90)  return "yellow";
  if (days <= 180) return "green";
  return "grey";
}

function badgeLabel(days) {
  if (days === null) return "TBD";
  if (days < 0)     return "Passed";
  if (days === 0)   return "Today!";
  return `${days}d`;
}

/* ── Row builder ──────────────────────────────────────────────────────── */
function buildRow(c) {
  const days   = daysUntil(c.abstract_deadline);
  const cls    = badgeCls(days);
  const lbDays = daysUntil(c.late_breaking_deadline);

  // Abstract deadline cell
  const dlText = c.abstract_deadline
    ? `<span class="deadline-date ${cls}">${fmtDate(c.abstract_deadline)}</span>
       <span class="badge ${cls}">${badgeLabel(days)}</span>`
    : `<span class="deadline-date tbd">TBD</span>`;

  const lbText = c.late_breaking_deadline
    ? `<div class="lb-date">⚡ ${fmtDate(c.late_breaking_deadline)}
        ${lbDays !== null && lbDays >= 0 ? `<span class="badge ${badgeCls(lbDays)}" style="font-size:.68rem">${lbDays}d</span>` : (lbDays < 0 ? "<em>(passed)</em>" : "")}
       </div>`
    : `<span style="color:var(--muted);font-size:.8rem">—</span>`;

  // Conference dates
  const confDates = (c.date_start && c.date_end)
    ? (c.date_start.slice(0,7) === c.date_end.slice(0,7)
        ? `${fmtDateShort(c.date_start)}–${fmtDateShort(c.date_end)}, ${c.date_start.slice(0,4)}`
        : `${fmtDate(c.date_start)} – ${fmtDate(c.date_end)}`)
    : (c.date_start ? fmtDate(c.date_start) : "<span style='color:var(--muted)'>TBA</span>");

  // Location
  const loc = `
    <div class="location-country">${c.country || "—"}</div>
    ${c.city    ? `<div class="location-city">${c.city}</div>` : ""}
    ${c.venue   ? `<div class="location-venue">${c.venue}</div>` : ""}`;

  // Links
  const links =
    (c.website_url    ? `<a class="link-btn" href="${c.website_url}"    target="_blank">🌐 Site</a>` : "") +
    (c.submission_url ? `<a class="link-btn" href="${c.submission_url}" target="_blank">📤 Submit</a>` : "");

  return `<tr data-name="${c.name}" data-year="${c.year}" data-deadline="${c.abstract_deadline||''}" data-country="${c.country||''}">
    <td><span class="conf-name">${c.name}</span><span class="conf-year">${c.year}</span></td>
    <td class="deadline-cell">${dlText}</td>
    <td>${lbText}</td>
    <td class="date-range">${confDates}</td>
    <td>${loc}</td>
    <td>${links || "—"}</td>
  </tr>`;
}

/* ── State ────────────────────────────────────────────────────────────── */
let allData = [];
let activeFilter = "all";
let sortCol = "abstract_deadline";
let sortAsc = true;
let query   = "";

function sortKey(c, col) {
  const v = c[col] || "";
  if (col === "name") return `${c.name}_${c.year}`;
  return v || "9999-99-99";
}

function applyAll() {
  const yr = today.getFullYear();
  let data = allData.filter(c => {
    if (query) {
      const q = query.toLowerCase();
      if (!(c.name||"").toLowerCase().includes(q) &&
          !(c.city||"").toLowerCase().includes(q) &&
          !(c.country||"").toLowerCase().includes(q) &&
          !(c.venue||"").toLowerCase().includes(q)) return false;
    }
    if (activeFilter === "upcoming") {
      const d = daysUntil(c.abstract_deadline);
      return d !== null && d >= 0;
    }
    if (activeFilter === "3mo") {
      const d = daysUntil(c.abstract_deadline);
      return d !== null && d >= 0 && d <= 90;
    }
    if (activeFilter === "year") return c.year === yr;
    return true;
  });

  data.sort((a, b) => {
    const ka = sortKey(a, sortCol), kb = sortKey(b, sortCol);
    return sortAsc ? (ka < kb ? -1 : ka > kb ? 1 : 0)
                   : (ka > kb ? -1 : ka < kb ? 1 : 0);
  });

  const tbody = document.getElementById("tbody");
  if (!data.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="6">No conferences match this filter.</td></tr>`;
  } else {
    tbody.innerHTML = data.map(buildRow).join("");
  }

  // Update sort icon styling
  document.querySelectorAll("th").forEach(th => {
    th.classList.toggle("sorted", th.dataset.col === sortCol);
    const icon = th.querySelector(".sort-icon");
    if (icon && th.dataset.col === sortCol) icon.textContent = sortAsc ? " ↑" : " ↓";
    else if (icon) icon.textContent = " ↕";
  });
}

/* ── Event listeners ──────────────────────────────────────────────────── */
document.querySelectorAll(".btn-filter").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".btn-filter").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    applyAll();
  });
});

document.querySelectorAll("th[data-col]").forEach(th => {
  th.addEventListener("click", () => {
    if (sortCol === th.dataset.col) sortAsc = !sortAsc;
    else { sortCol = th.dataset.col; sortAsc = true; }
    applyAll();
  });
});

document.getElementById("search").addEventListener("input", e => {
  query = e.target.value.trim();
  applyAll();
});

/* ── Load ─────────────────────────────────────────────────────────────── */
async function load() {
  const footer = document.getElementById("footer");
  try {
    const res = await fetch("../conferences.json");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allData = await res.json();
    applyAll();

    const ts = allData.reduce((best, c) => c.last_scraped > best ? c.last_scraped : best, "");
    footer.textContent = ts
      ? `Last updated: ${new Date(ts).toLocaleString("en-US", { dateStyle:"medium", timeStyle:"short" })}`
      : `Data last manually curated · ${allData.length} conferences`;
  } catch(e) {
    footer.textContent = "⚠️  Could not load conferences.json — serve via: python -m http.server 8765";
    console.error(e);
  }
}

load();
</script>
</body>
</html>
